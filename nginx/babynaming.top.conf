# ============================================
# babynaming.top — Nginx 反向代理配置
# ============================================
# 用法：
#   1. 将此文件复制到服务器 /etc/nginx/conf.d/babynaming.top.conf
#   2. 先注释掉 443 的 server 块，只保留 80 的
#   3. nginx -t && systemctl reload nginx
#   4. 用 certbot 申请证书（会自动修改配置）
#   5. 或者取消注释 443 块，手动填入证书路径
# ============================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name babynaming.top www.babynaming.top;

    # Certbot 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 全部重定向到 HTTPS
    location / {
        return 301 https://babynaming.top$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name babynaming.top www.babynaming.top;

    # --- SSL 证书（certbot 申请后自动生成） ---
    ssl_certificate     /etc/letsencrypt/live/babynaming.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babynaming.top/privkey.pem;

    # --- SSL 安全配置 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- www 跳转到裸域 ---
    if ($host = www.babynaming.top) {
        return 301 https://babynaming.top$request_uri;
    }

    # --- 反向代理到 Next.js ---
    location / {
        proxy_pass http://127.0.0.1:3999;
        proxy_http_version 1.1;

        # WebSocket 支持（Next.js HMR 等）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 生成名字可能较慢）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- 静态资源缓存 ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3999;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # --- Gzip 压缩 ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
