# ============================================
# 诗名 (name-web) — 自动部署到服务器
# ============================================
# 触发条件：push 到 main 分支
# 部署方式：GitHub runner 构建镜像 → SCP 传输 → SSH 部署
# 优势：服务器无需访问 GitHub，适合国内服务器
#
# 需要配置的 GitHub Secrets：
#   SERVER_HOST     — 服务器 IP 或域名
#   SERVER_PORT     — SSH 端口（默认 22）
#   SERVER_USER     — SSH 登录用户名
#   SERVER_PASSWORD  — SSH 登录密码
#   AI_API_KEY      — AI API 密钥（火山引擎 ARK）
#   AI_BASE_URL     — AI API 基础地址
#   AI_MODEL        — AI 模型名称

name: Deploy to Server

on:
  push:
    branches: [main]

  # 支持手动触发
  workflow_dispatch:

env:
  IMAGE_NAME: name-web
  CONTAINER_NAME: name-web
  HOST_PORT: 3999

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # --- 第 1 步：拉代码 ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 第 2 步：在 runner 上构建 Docker 镜像 ---
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      # --- 第 3 步：导出镜像为 tar ---
      - name: Save Docker image
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > name-web-image.tar.gz
          ls -lh name-web-image.tar.gz

      # --- 第 4 步：传输镜像到服务器 ---
      - name: Transfer image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: name-web-image.tar.gz
          target: /tmp

      # --- 第 5 步：SSH 到服务器部署 ---
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          envs: IMAGE_NAME,CONTAINER_NAME,HOST_PORT
          script: |
            set -e

            echo "🚀 开始部署诗名..."

            # --- 加载镜像 ---
            echo "📦 加载 Docker 镜像..."
            gunzip -c /tmp/name-web-image.tar.gz | docker load
            rm -f /tmp/name-web-image.tar.gz

            # --- 写入环境变量文件 ---
            mkdir -p ~/name-web
            cat > ~/name-web/.env.local <<'ENVEOF'
            AI_API_KEY=${{ secrets.AI_API_KEY }}
            AI_BASE_URL=${{ secrets.AI_BASE_URL }}
            AI_MODEL=${{ secrets.AI_MODEL }}
            ENVEOF

            # --- 停止旧容器 ---
            echo "🛑 停止旧容器..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # --- 启动新容器 ---
            echo "✅ 启动新容器..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $HOST_PORT:3999 \
              --env-file ~/name-web/.env.local \
              $IMAGE_NAME:latest

            # --- 清理旧镜像 ---
            echo "🧹 清理悬空镜像..."
            docker image prune -f

            # --- 验证 ---
            echo "⏳ 等待服务启动..."
            sleep 5
            if curl -sf http://localhost:$HOST_PORT > /dev/null; then
              echo "🎉 部署成功！服务运行在端口 $HOST_PORT"
            else
              echo "⚠️ 服务可能还在启动中，请稍后手动检查"
              docker logs $CONTAINER_NAME --tail 20
            fi
