# ============================================
# 诗名 (name-web) — 自动部署到服务器
# ============================================
# 触发条件：push 到 main 分支
# 部署方式：SSH 到服务器 → git pull → docker build → 启动容器
# 自动化：首次部署自动安装 Nginx + 申请 SSL 证书，后续跳过
#
# 需要配置的 GitHub Secrets：
#   SERVER_HOST     — 服务器 IP 或域名
#   SERVER_PORT     — SSH 端口（默认 22）
#   SERVER_USER     — SSH 登录用户名
#   SERVER_PASSWORD  — SSH 登录密码
#   AI_API_KEY      — AI API 密钥（火山引擎 ARK）
#   AI_BASE_URL     — AI API 基础地址
#   AI_MODEL        — AI 模型名称
#   DOMAIN          — 网站域名（如 babynaming.top）
#   REPO_URL        — Git 仓库 HTTPS 地址（如 https://github.com/woodyyan/name-web.git）

name: Deploy to Server

on:
  push:
    branches: [main]

  # 支持手动触发
  workflow_dispatch:

env:
  IMAGE_NAME: name-web
  CONTAINER_NAME: name-web
  HOST_PORT: 3999
  DOMAIN: ${{ secrets.DOMAIN || 'babynaming.top' }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # --- 第 1 步：SSH 到服务器拉代码、构建镜像、启动容器 ---
      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 1200s
          envs: IMAGE_NAME,CONTAINER_NAME,HOST_PORT
          script: |
            set -e

            REPO_DIR=~/name-web
            REPO_URL="${{ secrets.REPO_URL || 'https://github.com/woodyyan/name-web.git' }}"

            echo "🚀 开始部署诗名..."

            # --- 拉取最新代码 ---
            if [ -d "$REPO_DIR/.git" ]; then
              echo "📥 拉取最新代码..."
              cd $REPO_DIR
              git fetch --all
              git reset --hard origin/main
            elif [ -d "$REPO_DIR" ]; then
              echo "⚠️ $REPO_DIR 存在但不是 git 仓库，备份后重新克隆..."
              # 保留可能有用的 .env.local
              [ -f "$REPO_DIR/.env.local" ] && cp "$REPO_DIR/.env.local" /tmp/.env.local.bak || true
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
              cd "$REPO_DIR"
              # 恢复 .env.local
              [ -f /tmp/.env.local.bak ] && mv /tmp/.env.local.bak "$REPO_DIR/.env.local" || true
            else
              echo "📥 首次克隆仓库..."
              git clone "$REPO_URL" "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            # --- 写入环境变量文件 ---
            cat > $REPO_DIR/.env.local <<ENVEOF
            AI_API_KEY=${{ secrets.AI_API_KEY }}
            AI_BASE_URL=${{ secrets.AI_BASE_URL }}
            AI_MODEL=${{ secrets.AI_MODEL }}
            ENVEOF

            # --- 构建 Docker 镜像 ---
            echo "🔨 构建 Docker 镜像..."
            docker build -t $IMAGE_NAME:latest $REPO_DIR

            # --- 停止旧容器 ---
            echo "🛑 停止旧容器..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # --- 启动新容器 ---
            echo "✅ 启动新容器..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $HOST_PORT:3999 \
              --env-file $REPO_DIR/.env.local \
              $IMAGE_NAME:latest

            # --- 清理旧镜像 ---
            echo "🧹 清理悬空镜像..."
            docker image prune -f

            # --- 验证应用 ---
            echo "⏳ 等待服务启动..."
            sleep 5
            if curl -sf http://localhost:$HOST_PORT > /dev/null; then
              echo "🎉 应用部署成功！服务运行在端口 $HOST_PORT"
            else
              echo "⚠️ 服务可能还在启动中，请稍后手动检查"
              docker logs $CONTAINER_NAME --tail 20
            fi

      # --- 第 2 步：配置 Nginx + SSL（幂等，已有则跳过）---
      - name: Setup Nginx & SSL
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 600s
          envs: HOST_PORT,DOMAIN
          script: |
            set -e

            NGINX_CONF="/etc/nginx/conf.d/${DOMAIN}.conf"
            REPO_CONF=~/name-web/nginx/babynaming.top.conf

            # ========== 1. 安装 Nginx（如果没有）==========
            if ! command -v nginx &>/dev/null; then
              echo "📦 安装 Nginx..."
              if command -v apt-get &>/dev/null; then
                apt-get update -qq && apt-get install -y -qq nginx
              elif command -v yum &>/dev/null; then
                yum install -y -q nginx
              fi
              systemctl enable nginx
              systemctl start nginx
              echo "✅ Nginx 已安装并启动"
            else
              echo "✅ Nginx 已存在，跳过安装"
            fi

            # ========== 2. 安装 Certbot（如果没有）==========
            if ! command -v certbot &>/dev/null; then
              echo "📦 安装 Certbot..."
              if command -v apt-get &>/dev/null; then
                apt-get install -y -qq certbot python3-certbot-nginx
              elif command -v yum &>/dev/null; then
                yum install -y -q certbot python3-certbot-nginx
              fi
              echo "✅ Certbot 已安装"
            else
              echo "✅ Certbot 已存在，跳过安装"
            fi

            # ========== 3. 部署 Nginx 配置（如果没有或有更新）==========
            if [ -f "$REPO_CONF" ]; then
              if [ ! -f "$NGINX_CONF" ] || ! diff -q "$REPO_CONF" "$NGINX_CONF" &>/dev/null; then
                echo "📝 更新 Nginx 配置..."
                cp "$REPO_CONF" "$NGINX_CONF"
                echo "✅ Nginx 配置已更新"
              else
                echo "✅ Nginx 配置无变化，跳过"
              fi
            fi

            # ========== 4. 申请 SSL 证书（如果没有）==========
            CERT_PATH="/etc/letsencrypt/live/${DOMAIN}/fullchain.pem"
            if [ ! -f "$CERT_PATH" ]; then
              echo "🔐 首次申请 SSL 证书..."

              # 先用一个临时的纯 HTTP 配置让 Nginx 能启动（certbot 需要 80 端口验证）
              mkdir -p /var/www/certbot
              cat > "$NGINX_CONF" <<TMPEOF
            server {
                listen 80;
                listen [::]:80;
                server_name ${DOMAIN} www.${DOMAIN};

                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }

                location / {
                    proxy_pass http://127.0.0.1:${HOST_PORT};
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                }
            }
            TMPEOF

              nginx -t && systemctl reload nginx

              # 申请证书
              certbot --nginx \
                -d ${DOMAIN} -d www.${DOMAIN} \
                --non-interactive \
                --agree-tos \
                --email admin@${DOMAIN} \
                --redirect

              echo "✅ SSL 证书申请成功！"

              # 恢复完整配置（含 SSL）
              if [ -f "$REPO_CONF" ]; then
                cp "$REPO_CONF" "$NGINX_CONF" 2>/dev/null || true
              fi
              # certbot --nginx 已经帮我们配好了，直接 reload
              nginx -t && systemctl reload nginx
              echo "✅ HTTPS 已启用"
            else
              echo "✅ SSL 证书已存在，跳过申请"
              # 确保 Nginx 配置生效
              nginx -t && systemctl reload nginx
            fi

            # ========== 5. 确保证书自动续期 ==========
            if ! systemctl is-enabled certbot.timer &>/dev/null 2>&1; then
              # 有些系统用 timer，有些用 cron
              if systemctl list-unit-files | grep -q certbot.timer; then
                systemctl enable certbot.timer
                systemctl start certbot.timer
                echo "✅ 证书自动续期已启用（systemd timer）"
              elif ! crontab -l 2>/dev/null | grep -q certbot; then
                (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet --post-hook 'systemctl reload nginx'") | crontab -
                echo "✅ 证书自动续期已启用（cron）"
              else
                echo "✅ 证书自动续期已配置"
              fi
            else
              echo "✅ 证书自动续期已配置"
            fi

            echo ""
            echo "🎉 全部完成！访问 https://${DOMAIN}"
