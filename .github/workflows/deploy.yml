# ============================================
# 诗名 (name-web) — 自动部署到服务器
# ============================================
# 触发条件：push 到 main 分支
# 部署方式：Runner 构建镜像 → 推送腾讯云 TCR → 服务器 docker compose 部署
# 反向代理 + HTTPS：Caddy（自动申请/续期 Let's Encrypt 证书）
#
# 需要配置的 GitHub Secrets：
#   TCR_REGISTRY    — 腾讯云镜像仓库地址（如 ccr.ccs.tencentyun.com）
#   TCR_NAMESPACE   — 镜像命名空间（如 my-namespace）
#   TCR_USERNAME    — 镜像仓库登录用户名
#   TCR_PASSWORD    — 镜像仓库登录密码
#   SERVER_HOST     — 服务器 IP 或域名
#   SERVER_PORT     — SSH 端口（默认 22）
#   SERVER_USER     — SSH 登录用户名
#   SERVER_PASSWORD  — SSH 登录密码
#   AI_API_KEY      — AI API 密钥（火山引擎 ARK）
#   AI_BASE_URL     — AI API 基础地址
#   AI_MODEL        — AI 模型名称
#   DOMAIN          — 网站域名（如 babynaming.top）

name: Deploy to Server

on:
  push:
    branches: [main]

  # 支持手动触发
  workflow_dispatch:

env:
  IMAGE_NAME: name-web
  CONTAINER_NAME: name-web
  HOST_PORT: 3999
  DOMAIN: ${{ secrets.DOMAIN || 'babynaming.top' }}
  # 完整镜像地址：registry/namespace/name:tag
  FULL_IMAGE: ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/name-web

jobs:
  # ==================== Job 1: 构建并推送镜像 ====================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Tencent Cloud Registry
        run: echo "${{ secrets.TCR_PASSWORD }}" | docker login ${{ secrets.TCR_REGISTRY }} -u "${{ secrets.TCR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ env.FULL_IMAGE }}:${{ github.sha }} -t ${{ env.FULL_IMAGE }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.FULL_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FULL_IMAGE }}:latest

  # ==================== Job 2: 部署到服务器 ====================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15

    steps:
      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 600s
          envs: CONTAINER_NAME,HOST_PORT,DOMAIN
          script: |
            set -e

            FULL_IMAGE="${{ env.FULL_IMAGE }}"
            TCR_REGISTRY="${{ secrets.TCR_REGISTRY }}"
            TCR_USERNAME="${{ secrets.TCR_USERNAME }}"
            TCR_PASSWORD="${{ secrets.TCR_PASSWORD }}"
            DEPLOY_DIR=~/name-web

            echo "🚀 开始部署诗名..."

            # --- 登录腾讯云镜像仓库 ---
            echo "🔑 登录镜像仓库..."
            echo "$TCR_PASSWORD" | docker login "$TCR_REGISTRY" -u "$TCR_USERNAME" --password-stdin

            # --- 准备部署目录 ---
            mkdir -p "$DEPLOY_DIR"

            # --- 写入环境变量文件 ---
            cat > "$DEPLOY_DIR/.env.local" <<ENVEOF
            AI_API_KEY=${{ secrets.AI_API_KEY }}
            AI_BASE_URL=${{ secrets.AI_BASE_URL }}
            AI_MODEL=${{ secrets.AI_MODEL }}
            ENVEOF

            # --- 写入 Caddyfile ---
            cat > "$DEPLOY_DIR/Caddyfile" <<'CADDYEOF'
            babynaming.top {
            	reverse_proxy web:3999

            	@static path /_next/static/*
            	header @static Cache-Control "public, max-age=31536000, immutable"
            }

            www.babynaming.top {
            	redir https://babynaming.top{uri} permanent
            }
            CADDYEOF

            # --- 写入 docker-compose.yml ---
            cat > "$DEPLOY_DIR/docker-compose.yml" <<COMPOSEEOF
            services:
              web:
                image: ${FULL_IMAGE}:latest
                container_name: ${CONTAINER_NAME}
                restart: unless-stopped
                ports:
                  - "3999:3999"
                env_file:
                  - .env.local
                networks:
                  - app-network

              caddy:
                image: caddy:2-alpine
                container_name: ${CONTAINER_NAME}-caddy
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                  - "443:443/udp"
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile:ro
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  - web
                networks:
                  - app-network

            volumes:
              caddy_data:
              caddy_config:

            networks:
              app-network:
                driver: bridge
            COMPOSEEOF

            # --- 清理非 Compose 管理的旧容器（首次迁移时需要）---
            echo "🛑 清理可能存在的旧容器..."
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            docker rm -f "${CONTAINER_NAME}-caddy" 2>/dev/null || true

            # --- 停止宿主机上的 Nginx（如果有，释放 80/443 端口给 Caddy）---
            if systemctl is-active nginx &>/dev/null; then
              echo "🛑 停止宿主机 Nginx（端口让给 Caddy）..."
              systemctl stop nginx
              systemctl disable nginx
            fi

            # --- 拉取最新镜像并重建容器 ---
            cd "$DEPLOY_DIR"
            echo "📥 拉取最新镜像..."
            docker compose pull
            echo "🔄 重建容器..."
            docker compose up -d --force-recreate

            # --- 清理旧镜像 ---
            echo "🧹 清理悬空镜像..."
            docker image prune -f

            # --- 验证应用 ---
            echo "⏳ 等待服务启动..."
            sleep 8
            if curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "🎉 应用部署成功！Caddy 已在 80/443 端口提供服务"
            else
              echo "⚠️ 服务可能还在启动中，请稍后手动检查"
              docker compose logs --tail 30
            fi

            echo ""
            echo "🎉 全部完成！访问 https://${DOMAIN}"
